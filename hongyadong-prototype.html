<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — XUYUAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Murecho:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #ffffff;
      color: #000000;
      --ui-top-color: rgba(0, 0, 0, 0.52);
      --ui-rule-color: rgba(0, 0, 0, 0.24);
      --ui-brand-color: rgba(0, 0, 0, 0.88);
      --ui-title-color: rgba(0, 0, 0, 0.95);
      --ui-zh-color: rgba(0, 0, 0, 0.42);
      --ui-sub-color: rgba(0, 0, 0, 0.50);
      --ui-side-color: rgba(0, 0, 0, 0.38);
      --ui-bottom-color: rgba(0, 0, 0, 0.44);
      --ui-explain-color: rgba(0, 0, 0, 0.40);
    }

    body {
      min-height: 300vh;
      overflow-x: hidden;
      font-family: "Aptos", "Segoe UI", sans-serif;
    }

    /* ── sticky stage ─────────────────────────────────────────────── */
    .stage {
      position: sticky;
      top: 0;
      height: 100vh;
      height: 100svh;
      height: 100dvh; /* collapses with mobile browser chrome */
      overflow: hidden;
      isolation: isolate;
    }

    /* ── hidden source image for particle sampling ────────────────── */
    .source-image {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      user-select: none;
    }

    /* gradient fog: darkens top edge + bottom edge for composition */
    .fog {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom,
          rgba(4, 2, 8, 0.55)  0%,
          rgba(4, 2, 8, 0.10) 16%,
          transparent         38%,
          transparent         56%,
          rgba(4, 2, 8, 0.42) 78%,
          rgba(2, 0, 4, 0.82) 100%
        );
    }

    /* particle canvas */
    canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: block;
    }

    /* glow layer — CSS blur is GPU, replaces per-particle createRadialGradient */
    #glow {
      filter: blur(8px);
      mix-blend-mode: screen;
      opacity: 0.2;
    }

    /* ── UI overlay ───────────────────────────────────────────────── */
    .ui {
      position: relative;
      z-index: 2;
      width: min(1280px, 100%);
      height: 100%;
      margin: 0 auto;
      padding:
        calc(clamp(30px, 4.6vw, 72px) + env(safe-area-inset-top, 0px))
        calc(clamp(30px, 4.6vw, 72px) + env(safe-area-inset-right, 0px))
        calc(clamp(30px, 4.6vw, 72px) + env(safe-area-inset-bottom, 0px))
        calc(clamp(30px, 4.6vw, 72px) + env(safe-area-inset-left, 0px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      pointer-events: none;
    }

    .top, .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ui-top-color);
    }

    .eyebrow, .hint {
      display: flex;
      align-items: center;
      gap: 16px;
      font-weight: 400;
    }

    .eyebrow::before, .hint::before {
      content: "";
      width: 36px;
      height: 1px;
      background: currentColor;
      opacity: 0.45;
    }

    .brand {
      text-align: right;
      line-height: 1.7;
    }

    .brand strong {
      display: block;
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      font-weight: 400;
      font-size: 20px;
      letter-spacing: 0.28em;
      color: var(--ui-brand-color);
      text-transform: none;
    }

    .hero {
      align-self: center;
      max-width: min(860px, 78vw);
      padding-bottom: clamp(56px, 8vh, 96px);
    }

    .hero h1 {
      margin: 0 0 0.14em;
      font-family: 'Cormorant Garamond', 'ZCOOL XiaoWei', 'Noto Serif SC', Georgia, serif;
      font-size: clamp(82px, 12vw, 168px);
      line-height: 0.88;
      font-weight: 300;
      letter-spacing: 0.02em;
      color: var(--ui-title-color);
      text-transform: none;
    }

    .hero h1 .title-line {
      display: block;
      opacity: 0;
      transform: translateY(38px);
      filter: blur(8px);
    }

    .hero h1.is-ready .title-line {
      animation: titleReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .hero h1.is-ready .title-line:nth-child(1) {
      animation-delay: 0.06s;
    }

    .hero h1.is-ready .title-line:nth-child(2) {
      animation-delay: 0.18s;
    }

    @keyframes titleReveal {
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .hero .zh {
      margin: 0 0 22px;
      font-family: 'Cormorant Garamond', 'ZCOOL XiaoWei', 'Noto Serif SC', Georgia, serif;
      font-size: clamp(14px, 1.25vw, 18px);
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--ui-zh-color);
      text-shadow: 0 2px 12px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.12);
    }

    .reveal-copy {
      opacity: 0;
      visibility: hidden;
    }

    .reveal-copy.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .reveal-line {
      display: block;
    }

    .reveal-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(18px);
      filter: blur(6px);
      will-change: transform, opacity, filter;
    }

    .reveal-copy.is-visible .reveal-word {
      animation: copyReveal 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: calc(var(--reveal-delay, 0ms) + (var(--word-index) * 110ms));
    }

    @keyframes copyReveal {
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .hero .sub {
      margin: 0;
      max-width: 620px;
      font-family: 'Murecho', 'Inter', system-ui, sans-serif;
      font-size: clamp(16px, 1.5vw, 22px);
      font-weight: 400;
      line-height: 1.55;
      letter-spacing: -0.01em;
      color: var(--ui-sub-color);
      text-shadow: 0 2px 12px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.12);
    }

    .side {
      position: absolute;
      top: 50%;
      right: clamp(18px, 3vw, 44px);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      font-size: 14px;
      letter-spacing: 0.78em;
      color: var(--ui-side-color);
      z-index: 2;
      pointer-events: none;
    }

    .bottom {
      align-items: flex-end;
      color: var(--ui-bottom-color);
      padding-bottom: 2px;
    }

    .meta { text-align: right; line-height: 1.9; }

    .explain {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 3;
      white-space: nowrap;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--ui-explain-color);
      pointer-events: none;
    }

    @media (max-width: 768px) {
      body { min-height: 250vh; }
      .ui {
        padding:
          calc(24px + env(safe-area-inset-top, 0px))
          calc(20px + env(safe-area-inset-right, 0px))
          calc(28px + env(safe-area-inset-bottom, 0px))
          calc(20px + env(safe-area-inset-left, 0px));
      }
      .hero { max-width: 92vw; padding-bottom: 40px; }
      .hero h1 { font-size: clamp(54px, 15vw, 104px); }
      .hero .zh { font-size: 13px; letter-spacing: 0.14em; margin: 0 0 16px; }
      .hero .sub { font-size: 14px; max-width: 360px; line-height: 1.5; }
      .top, .bottom { font-size: 11px; letter-spacing: 0.14em; }
      .explain { display: none; }
    }

    @media (max-height: 760px) {
      .ui { padding-top: max(22px, env(safe-area-inset-top, 0px)); }
      .hero { max-width: min(820px, 82vw); padding-bottom: 28px; }
      .hero h1 { font-size: clamp(62px, 10vw, 128px); }
      .hero .zh { margin-bottom: 14px; }
      .hero .sub { max-width: 520px; font-size: clamp(14px, 1.3vw, 18px); }
    }

    @media (max-width: 900px) and (orientation: landscape) {
      body { min-height: 220vh; }
      .ui {
        padding:
          calc(18px + env(safe-area-inset-top, 0px))
          calc(18px + env(safe-area-inset-right, 0px))
          calc(22px + env(safe-area-inset-bottom, 0px))
          calc(18px + env(safe-area-inset-left, 0px));
      }
      .hero {
        max-width: min(72vw, 620px);
        align-self: end;
        padding-bottom: 16px;
      }
      .hero h1 { font-size: clamp(42px, 8vw, 78px); }
      .hero .sub { max-width: 420px; font-size: 13px; }
      .top, .bottom { font-size: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero h1 .title-line,
      .reveal-word {
        opacity: 1;
        transform: none;
        filter: none;
        animation: none !important;
      }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: clamp(44px, 14vw, 80px); }
      .hero .zh { font-size: 12px; letter-spacing: 0.12em; margin: 0 0 14px; }
      .hero .sub { font-size: 13px; max-width: 100%; }
      .top { gap: 12px; }
      .eyebrow { display: none; }
    }
  </style>
</head>

    // ── hardware tier ─────────────────────────────────────────────────
    // 0 = low  (old phone, budget device)
    // 1 = mid  (typical mobile, integrated GPU)
    // 2 = high (desktop, M-series, discrete GPU)
    const _cores  = navigator.hardwareConcurrency || 2;
    const _mem    = navigator.deviceMemory || 4;
    const _touch  = 'ontouchstart' in window;
    const _dpr    = window.devicePixelRatio || 1;
    const _motionQuery = window.matchMedia ? window.matchMedia("(prefers-reduced-motion: reduce)") : null;
    const _reducedMotion = !!(_motionQuery && _motionQuery.matches);
    const _connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    const _saveData = !!(_connection && _connection.saveData);

    function estimateMaxTier(width = window.innerWidth, height = window.innerHeight) {
      if (_saveData || _reducedMotion) return 0;

      let tier = (_cores >= 10 && _mem >= 8) ? 2 : (_cores >= 6 && _mem >= 4) ? 1 : 0;
      const shortEdge = Math.min(width, height);
      const area = Math.max(width * height, 1);

      if (_touch) tier = Math.min(tier, 1);
      if (shortEdge <= 480 || area <= 430000) tier = 0;
      if (_dpr >= 2.2 && area >= 2560 * 1440) tier = Math.max(0, tier - 1);

      return tier;
    }

        spread: 13,
        parallaxX: 0.006,
        parallaxY: 0.10,
        baseYOffset: 0.17,
        igniteLift: 18,
        glowThreshold: 0.76,
        pxScale: 1,
        twinkle: true,
      },
      {
        sampleLong: 440,
        sampleLongMax: 620,
        dprCap: 1.75,
        glowOn: true,
        glowOpacity: 0.18,
        moteCount: 24,
        sampleStep: 1,
        hoverOn: true,
        hoverRadius: 110,
        hoverPush: 34,
        spread: 16,
        parallaxX: 0.008,
        parallaxY: 0.12,
        baseYOffset: 0.18,
        igniteLift: 22,
        glowThreshold: 0.68,
        pxScale: 1,
        twinkle: true,
      },
    ];

    function applyTier() {
      const cfg = TIER_CFG[TIER];
      glowCanvas.style.opacity = cfg.glowOn ? String(cfg.glowOpacity) : "0";
      // resize pixel buffer for new tier's pxScale
      const ps = cfg.pxScale;
      pxCanvas.width  = Math.ceil(W * ps);
      pxCanvas.height = Math.ceil(H * ps);
      pxImgData = pxCtx.createImageData(pxCanvas.width, pxCanvas.height);
      pxPixels  = pxImgData.data;
      lastDrift = -1; // force redraw on next frame
      buildMotes();
      const snapTier = TIER;
      const rebuild = () => { if (TIER === snapTier) buildImageParticles(); };
      if (window.requestIdleCallback) requestIdleCallback(rebuild);
      else setTimeout(rebuild, 0);
    }

    let W = 0, H = 0;
    let scrollY = 0, smoothY = 0;
    let mouseX = -9999, mouseY = -9999;
    let smoothMX = -9999, smoothMY = -9999;
    let rafId, resizeTimer, scrollMax = 1;
    let imageParticles = [];
    let motes = [];
    let slowFrames = 0, fastFrames = 0, lastNow = 0;
    let lastDrift = -1, lastSmoothMX = -9999, lastSmoothMY = -9999;

    // ── helpers ──────────────────────────────────────────────────────
    function hash(n) {
      const s = Math.sin(n * 127.1 + 311.7) * 43758.5453123;
      return s - Math.floor(s);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function smoothstep(edge0, edge1, x) {
      const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    }

    function mixColor(from, to, t) {
      return `rgba(${Math.round(lerp(from[0], to[0], t))}, ${Math.round(lerp(from[1], to[1], t))}, ${Math.round(lerp(from[2], to[2], t))}, ${lerp(from[3], to[3], t).toFixed(3)})`;
    }

    function setStyleIfChanged(el, property, value) {
      if (!el) return;
      if (el.style[property] !== value) el.style[property] = value;
    }

    function prepareWordReveal(el) {
      if (!el || el.dataset.revealPrepared === "1") return;

      const lines = el.innerHTML
        .split(/<br\s*\/?>/i)
        .map(line => line.replace(/\s+/g, " ").trim());

      el.innerHTML = "";
      let wordIndex = 0;

      const tokenizeLine = (line) => {
        if (!line) return [];
        if (/\s/.test(line)) return line.split(" ");
        if (/[\u3400-\u9fff]/.test(line)) return Array.from(line);
        return [line];
      };

      lines.forEach((line, lineIndex) => {
        const lineEl = document.createElement("span");
        lineEl.className = "reveal-line";
        const words = tokenizeLine(line);

        words.forEach((word, index) => {
          const wordEl = document.createElement("span");
          wordEl.className = "reveal-word";
          wordEl.style.setProperty("--word-index", String(wordIndex++));
          wordEl.textContent = word;
          lineEl.appendChild(wordEl);
          if (index < words.length - 1) {
            lineEl.appendChild(document.createTextNode(" "));
          }
        });

        el.appendChild(lineEl);
        if (lineIndex < lines.length - 1) {
          el.appendChild(document.createElement("br"));
        }
      });

      el.dataset.revealPrepared = "1";
    }

    const COPY_REVEAL_THRESHOLD = _reducedMotion ? 0.18 : 0.24;

    if (heroZhEl) {
      heroZhEl.classList.add("reveal-copy");
      heroZhEl.style.setProperty("--reveal-delay", "160ms");
    }

    [eyebrowEl, heroZhEl, heroSubEl, hintEl].forEach(prepareWordReveal);

    requestAnimationFrame(() => {
      if (heroTitleEl) heroTitleEl.classList.add("is-ready");
    });

    function syncUIText(progress) {
      const textT = smoothstep(0.12, 0.48, progress);
      setStyleIfChanged(topEl, "color", mixColor([0, 0, 0, 0.52], [255, 255, 255, 0.82], textT));
      setStyleIfChanged(bottomEl, "color", mixColor([0, 0, 0, 0.44], [255, 255, 255, 0.78], textT));
      setStyleIfChanged(eyebrowEl, "color", mixColor([0, 0, 0, 0.52], [255, 255, 255, 0.82], textT));
      setStyleIfChanged(hintEl, "color", mixColor([0, 0, 0, 0.44], [255, 255, 255, 0.78], textT));
      setStyleIfChanged(heroTitleEl, "color", mixColor([0, 0, 0, 0.95], [255, 255, 255, 0.98], textT));
      setStyleIfChanged(heroZhEl, "color", mixColor([0, 0, 0, 0.42], [255, 255, 255, 0.72], textT));
      setStyleIfChanged(heroSubEl, "color", mixColor([0, 0, 0, 0.50], [255, 255, 255, 0.80], textT));
      setStyleIfChanged(sideEl, "color", mixColor([0, 0, 0, 0.38], [255, 255, 255, 0.68], textT));
      setStyleIfChanged(explainEl, "color", mixColor([0, 0, 0, 0.40], [255, 255, 255, 0.70], textT));

      const shouldShowCopy = progress >= COPY_REVEAL_THRESHOLD;
      if (shouldShowCopy !== syncUIText.copyVisible) {
        syncUIText.copyVisible = shouldShowCopy;
        [eyebrowEl, heroZhEl, heroSubEl, hintEl].forEach(el => {
          if (el) el.classList.toggle("is-visible", shouldShowCopy);
        });
      }
    }
    syncUIText.copyVisible = false;

    function buildMotes() {
      const cfg = TIER_CFG[TIER];
      motes = Array.from({ length: cfg.moteCount }, (_, i) => ({
        x:    hash(i * 3 + 1) * W,
        y:    hash(i * 3 + 2) * H,
        vy:   0.18 + hash(i * 3 + 3) * 0.32,   // upward speed
        r:    0.6  + hash(i * 7 + 1) * 1.8,
        a:    0.18 + hash(i * 7 + 2) * 0.44,
        warm: hash(i * 7 + 3) > 0.72,           // amber vs cool-white
      }));
    }

    function getTargetSampleLong() {
      const cfg = TIER_CFG[TIER];
      const isMobile = W < 768 || _touch;
      const baseLong = isMobile
        ? Math.round(cfg.sampleLong * (_reducedMotion ? 0.58 : 0.72))
        : cfg.sampleLong;

      if (isMobile) return baseLong;

      const referenceArea = 1440 * 900;
      const viewportArea  = Math.max(W * H, 1);
      const areaBoost     = clamp(Math.sqrt(viewportArea / referenceArea), 1, 1.32);
      const wideBoost     = clamp(Math.sqrt((W / H) / (16 / 10)), 1, 1.08);

      return Math.round(clamp(baseLong * areaBoost * wideBoost, baseLong, cfg.sampleLongMax));
    }

    function getCoverCrop(imageWidth, imageHeight, frameWidth, frameHeight, positionY = 0.44) {
      const scale = Math.max(frameWidth / imageWidth, frameHeight / imageHeight);
      const drawWidth = imageWidth * scale;
      const drawHeight = imageHeight * scale;
      const offsetX = (frameWidth - drawWidth) * 0.5;
      const offsetY = (frameHeight - drawHeight) * positionY;

      return { scale, drawWidth, drawHeight, offsetX, offsetY };
    }

    function buildImageParticles() {
      imageParticles = [];
      if (!bgSource.complete || !bgSource.naturalWidth || !bgSource.naturalHeight) return;

      // sample canvas matches viewport aspect ratio exactly →
      // uniform uScale eliminates any widescreen stretching
      const isMobile   = W < 768 || _touch;
      const sampleLong = getTargetSampleLong();
      const aspect     = W / H;
      const sampleWidth  = aspect >= 1
        ? sampleLong
        : Math.round(sampleLong * aspect);
      const sampleHeight = aspect >= 1
        ? Math.round(sampleLong / aspect)
        : sampleLong;
      const uScale = W / sampleWidth; // = H / sampleHeight (aspect ratios match)

      offscreen.width  = sampleWidth;
      offscreen.height = sampleHeight;
      offCtx.clearRect(0, 0, sampleWidth, sampleHeight);

      const crop = getCoverCrop(bgSource.naturalWidth, bgSource.naturalHeight, sampleWidth, sampleHeight, 0.60);
      offCtx.drawImage(bgSource, crop.offsetX, crop.offsetY, crop.drawWidth, crop.drawHeight);

      let imageData;
      try {
        imageData = offCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;
      } catch (e) {
        console.warn("[particles] getImageData blocked:", e.message);
        return;
      }
      const spacing = TIER_CFG[TIER].sampleStep;

      for (let y = 0; y < sampleHeight; y += spacing) {
        for (let x = 0; x < sampleWidth; x += spacing) {
          const idx = (y * sampleWidth + x) * 4;
          const r = imageData[idx];
          const g = imageData[idx + 1];
          const b = imageData[idx + 2];
          const a = imageData[idx + 3] / 255;
          if (a < 0.02) continue;

          const luma = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
          const sid  = x * 0.173 + y * 0.247;
          const warmHit = r > 155 && g > 75;
          const coolHit = b > 125;

          const minLuma = warmHit ? 0.05 : (coolHit ? 0.07 : 0.09);
          if (luma < minLuma) continue;

          const importance =
            0.14 +
            Math.pow(Math.max(luma, 0.02), 1.05) +
            (warmHit ? 0.18 : 0) +
            (coolHit ? 0.10 : 0);

          if (hash(sid + 19) > Math.min(0.99, importance * 1.35 + 0.10)) continue;

          // saturated target colours pre-baked at build time (1.6× chroma)
          const luma8  = Math.round(luma * 255);
          const rFinal = warmHit ? Math.min(255, Math.round(r * 1.08)) : r;
          const SAT    = 1.6;
          const sat = (v) => Math.max(0, Math.min(255, Math.round(luma8 + (v - luma8) * SAT)));

          imageParticles.push({
            x: x * uScale,
            y: y * uScale,
            ox: (hash(sid + 7)  - 0.5) * uScale * 0.45,
            oy: (hash(sid + 11) - 0.5) * uScale * 0.45,
            z:      0.08 + (y / sampleHeight) * 0.84 + hash(sid + 23) * 0.08,
            twinkle: hash(sid + 31) * Math.PI * 2,
            radius: (1.2 + luma * 1.6 + hash(sid + 41) * 0.6) * (isMobile ? 0.85 : 1.0),
            alpha:  clamp(0.82 + luma * 0.16, 0.82, 0.98),
            luma,
            luma8,
            sr: sat(rFinal),
            sg: sat(g),
            sb: sat(b),
          });
        }
      }
    }

    function drawMotes(drift) {
      for (const p of motes) {
        p.y -= p.vy;
        if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }

        // fade at top and bottom edges
        const edge = Math.min(p.y / (H * 0.18), 1) * Math.min((H - p.y) / (H * 0.14), 1);
        const alpha = p.a * Math.max(0, edge);
        if (alpha < 0.015) continue;

        // Interpolate from black to colored based on scroll
        const blackAmount = 1 - drift;
        const colorAmount = drift;
        
        let r, g, b;
        if (p.warm) {
          // Amber: rgba(255,195,62)
          r = Math.round(0 * blackAmount + 255 * colorAmount);
          g = Math.round(0 * blackAmount + 195 * colorAmount);
          b = Math.round(0 * blackAmount + 62 * colorAmount);
        } else {
          // Cool white: rgba(210,228,255)
          r = Math.round(0 * blackAmount + 210 * colorAmount);
          g = Math.round(0 * blackAmount + 228 * colorAmount);
          b = Math.round(0 * blackAmount + 255 * colorAmount);
        }

        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBackdrop(drift) {
      // Interpolate from white (top) to black (bottom)
      const whiteAmount = 1 - drift;
      const blackAmount = drift;
      
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      const topR = Math.round(255 * whiteAmount + 8 * blackAmount);
      const topG = Math.round(255 * whiteAmount + 5 * blackAmount);
      const topB = Math.round(255 * whiteAmount + 8 * blackAmount);
      const midR = Math.round(255 * whiteAmount + 12 * blackAmount);
      const midG = Math.round(255 * whiteAmount + 8 * blackAmount);
      const midB = Math.round(255 * whiteAmount + 15 * blackAmount);
      const botR = Math.round(255 * whiteAmount + 3 * blackAmount);
      const botG = Math.round(255 * whiteAmount + 2 * blackAmount);
      const botB = Math.round(255 * whiteAmount + 6 * blackAmount);
      
      bg.addColorStop(0, `rgba(${topR},${topG},${topB},0.96)`);
      bg.addColorStop(0.55, `rgba(${midR},${midG},${midB},0.92)`);
      bg.addColorStop(1, `rgba(${botR},${botG},${botB},0.98)`);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Only show river glow when scrolled (not at top)
      if (drift > 0.1) {
        const riverGlow = ctx.createRadialGradient(W * 0.56, H * 0.77, 0, W * 0.56, H * 0.77, W * 0.32);
        riverGlow.addColorStop(0, `rgba(255,182,118,${0.18 * drift})`);
        riverGlow.addColorStop(0.52, `rgba(255,72,72,${0.06 * drift})`);
        riverGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = riverGlow;
        ctx.fillRect(0, 0, W, H);
      }

      // Ground fog — visible on white, dissipates as scene goes dark
      const fogStrength = smoothstep(0.35, 0.0, drift);
      if (fogStrength > 0.005) {
        const fogH = H * 0.42;
        const fogY = H - fogH;
        const fog = ctx.createLinearGradient(0, fogY, 0, H);
        fog.addColorStop(0, `rgba(245,243,240,0)`);
        fog.addColorStop(0.38, `rgba(248,246,243,${0.52 * fogStrength})`);
        fog.addColorStop(1, `rgba(250,248,245,${0.86 * fogStrength})`);
        ctx.fillStyle = fog;
        ctx.fillRect(0, fogY, W, fogH);

        const w1 = ctx.createRadialGradient(W*0.3, H*0.9, 0, W*0.3, H*0.9, W*0.44);
        w1.addColorStop(0, `rgba(250,248,245,${0.3 * fogStrength})`);
        w1.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = w1;
        ctx.fillRect(0, H*0.65, W, H*0.35);

        const w2 = ctx.createRadialGradient(W*0.74, H*0.93, 0, W*0.74, H*0.93, W*0.36);
        w2.addColorStop(0, `rgba(250,248,245,${0.24 * fogStrength})`);
        w2.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = w2;
        ctx.fillRect(0, H*0.7, W, H*0.3);
      }
    }

    function drawImageParticles(time, drift, mx, my) {
      const cfg = TIER_CFG[TIER];
      const ignite      = smoothstep(0.02, 0.68, drift);
      const spread      = smoothstep(0.12, 1,    drift) * cfg.spread;
      const colorSat    = smoothstep(0.0,  0.50, drift);
      const parallaxX   = smoothY * cfg.parallaxX;
      const parallaxY   = smoothY * cfg.parallaxY;
      const baseYOffset = H * cfg.baseYOffset;

      const HOVER_R  = cfg.hoverRadius;
      const HOVER_R2 = HOVER_R * HOVER_R;
      const MAX_PUSH = cfg.hoverPush;
      const hoverEnabled = cfg.hoverOn && !_reducedMotion && mx > -9000 && my > -9000;

      const useGlow = cfg.glowOn && drift > 0.08;
      if (useGlow) glowCtx.clearRect(0, 0, W, H);

      // clear pixel buffer (transparent)
      pxPixels.fill(0);

      const pxScale = cfg.pxScale;
      const PW = pxCanvas.width;
      const PH = pxCanvas.height;

      for (const p of imageParticles) {
        const layerDepth = 1 + p.z * 0.22;
        let px = p.x + p.ox
          - parallaxX * layerDepth
          + p.luma * spread * 0.16;
        let py = p.y + p.oy
          + baseYOffset
          - parallaxY * (0.20 + p.z * 0.50)
          - ignite * (cfg.igniteLift * 0.55 + p.z * cfg.igniteLift);

        if (hoverEnabled) {
          const dx = px - mx;
          const dy = py - my;
          const d2 = dx * dx + dy * dy;
          if (d2 < HOVER_R2 && d2 > 0.01) {
            const d = Math.sqrt(d2);
            const t = 1 - d / HOVER_R;
            px += (dx / d) * t * t * MAX_PUSH;
            py += (dy / d) * t * t * MAX_PUSH;
          }
        }

        if (px < -8 || px > W + 8 || py < -8 || py > H + 8) continue;

        const twinkle = cfg.twinkle
          ? 0.84 + Math.sin(time * 1.15 + p.twinkle) * 0.16
          : 0.92;
        const radius  = p.radius * twinkle * (1 + ignite * p.luma * 0.08) * (0.7 + p.z * 0.5);
        const alpha   = p.alpha  * twinkle * (0.65 + p.z * 0.35);
        const pr      = Math.round(p.sr * colorSat);
        const pg      = Math.round(p.sg * colorSat);
        const pb      = Math.round(p.sb * colorSat);
        const pA      = (alpha * 255) | 0;

        // stamp circle — coordinates scaled to pixel buffer resolution
        const bx  = (px * pxScale) | 0;
        const by  = (py * pxScale) | 0;
        const br  = Math.max(1, Math.ceil(radius * pxScale));
        const br2 = (radius * pxScale) * (radius * pxScale);
        for (let dy = -br; dy <= br; dy++) {
          const y2 = dy * dy;
          if (y2 > br2) continue;
          const row = by + dy;
          if (row < 0 || row >= PH) continue;
          const rowOff = (row * PW) << 2;
          for (let dx = -br; dx <= br; dx++) {
            if (dx * dx + y2 > br2) continue;
            const col = bx + dx;
            if (col < 0 || col >= PW) continue;
            const i = rowOff + (col << 2);
            pxPixels[i]     = pr;
            pxPixels[i + 1] = pg;
            pxPixels[i + 2] = pb;
            pxPixels[i + 3] = pA;
          }
        }

        // glow pass kept as Canvas 2D — only bright particles, very few calls
        if (useGlow && p.luma > cfg.glowThreshold) {
          glowCtx.fillStyle = `rgba(${pr},${pg},${pb},${alpha * 0.30})`;
          glowCtx.beginPath();
          glowCtx.arc(px, py, radius * 5, 0, Math.PI * 2);
          glowCtx.fill();
        }
      }

      // single GPU upload — replaces thousands of arc/fill draw calls
      pxCtx.putImageData(pxImgData, 0, 0);
      ctx.drawImage(pxCanvas, 0, 0);
    }

    // ── resize ────────────────────────────────────────────────────────
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      MAX_TIER = estimateMaxTier(W, H);
      if (TIER > MAX_TIER) TIER = MAX_TIER;

      const DPR = Math.min(window.devicePixelRatio || 1, TIER_CFG[TIER].dprCap);
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width  = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      const gDPR = DPR * 0.5;
      glowCanvas.width  = Math.floor(W * gDPR);
      glowCanvas.height = Math.floor(H * gDPR);
      glowCanvas.style.width  = W + "px";
      glowCanvas.style.height = H + "px";
      glowCtx.setTransform(gDPR, 0, 0, gDPR, 0, 0);
      glowCanvas.style.opacity = TIER_CFG[TIER].glowOn ? String(TIER_CFG[TIER].glowOpacity) : "0";

      const ps = TIER_CFG[TIER].pxScale;
      pxCanvas.width  = Math.ceil(W * ps);
      pxCanvas.height = Math.ceil(H * ps);
      pxImgData = pxCtx.createImageData(pxCanvas.width, pxCanvas.height);
      pxPixels  = pxImgData.data;

      scrollMax = Math.max(1, document.documentElement.scrollHeight - H);
      buildMotes();
      buildImageParticles();
    }

    // ── scroll ────────────────────────────────────────────────────────
    function onScroll() {
      scrollY = window.scrollY;
      const progress = clamp(scrollY / (scrollMax * 0.72), 0, 1);
      syncUIText(progress);
    }

    // ── render ────────────────────────────────────────────────────────
    function render(now) {
      // Adaptive quality: 90 consecutive slow frames (~3 s) → drop one tier
      const dt = now - lastNow;
      lastNow = now;
      if (dt > 0 && dt < 1000) {
        if (dt > 28 && TIER > 0) {
          slowFrames++;
          fastFrames = 0;
          if (slowFrames > 45) {
            TIER--;
            applyTier();
            slowFrames = 0;
          }
        } else if (dt < 17 && TIER < MAX_TIER) {
          fastFrames++;
          slowFrames = Math.max(0, slowFrames - 2);
          if (fastFrames > 180) {
            TIER++;
            applyTier();
            fastFrames = 0;
          }
        } else {
          slowFrames = Math.max(0, slowFrames - 1);
          fastFrames = Math.max(0, fastFrames - 1);
        }
      }

      const time = now * 0.001;

      // smooth scroll for parallax
      const scrollEase = _reducedMotion ? 0.18 : 0.07;
      smoothY  += (scrollY - smoothY)   * scrollEase;
      smoothMX += (mouseX  - smoothMX)  * 0.12;
      smoothMY += (mouseY  - smoothMY)  * 0.12;

      const drift = clamp(smoothY / (scrollMax * 0.72), 0, 1);

      // idle-skip: tier 0 has no twinkle so the scene is deterministic —
      // skip drawing when nothing has changed (saves ~100% CPU when not scrolling)
      if (!TIER_CFG[TIER].twinkle && lastDrift >= 0
          && Math.abs(drift - lastDrift) < 0.0005
          && Math.abs(smoothMX - lastSmoothMX) < 1
          && Math.abs(smoothMY - lastSmoothMY) < 1) {
        fastFrames = 0; // don't count idle frames as "fast renders"
        rafId = requestAnimationFrame(render);
        return;
      }
      lastDrift    = drift;
      lastSmoothMX = smoothMX;
      lastSmoothMY = smoothMY;

      ctx.clearRect(0, 0, W, H);
      drawBackdrop(drift);
      drawImageParticles(time, drift, smoothMX, smoothMY);
      drawMotes(drift);

      rafId = requestAnimationFrame(render);
    }

    // ── init ──────────────────────────────────────────────────────────
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 120);
    });
    window.addEventListener("scroll", onScroll, { passive: true });

    function onMouseMove(e) {
      if (!TIER_CFG[TIER].hoverOn || _reducedMotion) return;
      mouseX = e.clientX;
      mouseY = e.clientY;
    }
    function onPointerLeave() { mouseX = -9999; mouseY = -9999; }
    window.addEventListener("mousemove",  onMouseMove, { passive: true });
    window.addEventListener("touchstart", onPointerLeave, { passive: true });
    window.addEventListener("mouseleave", onPointerLeave);
    window.addEventListener("touchend",   onPointerLeave);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        cancelAnimationFrame(rafId);
      } else {
        rafId = requestAnimationFrame(render);
      }
    });

    function start() {
      TIER = Math.min(TIER, MAX_TIER);
      glowCanvas.style.opacity = TIER_CFG[TIER].glowOn ? String(TIER_CFG[TIER].glowOpacity) : "0";
      resize();
      onScroll();
      rafId = requestAnimationFrame(render);
    }

    if (bgSource.complete && bgSource.naturalWidth) {
      start();
    } else {
      bgSource.addEventListener("load", start, { once: true });
      bgSource.addEventListener("error", () => {
        console.warn("[particles] source image failed to load — running without photo particles");
        start();
      }, { once: true });
    }
  </script>
</body>
</html>
