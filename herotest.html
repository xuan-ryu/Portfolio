<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字山水 - 完美定版存档</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; 
            height: 250vh; /* 留出充足的滚动空间体验反色与崩塌 */
            background-color: #FFFFFF; 
            transition: background-color 0.1s linear;
            overflow-x: hidden; 
            user-select: none;
        }

        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: auto;
        }
        
        /* Loading 遮罩：使用 mix-blend-mode 保证反色可见 */
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; text-align: center; color: #fff; letter-spacing: 0.5em;
            font-family: 'STSong', serif; transition: opacity 0.6s ease-out; 
            mix-blend-mode: difference;
        }
        #progress-bar { width: 180px; height: 1px; background: rgba(255,255,255,0.3); margin: 15px auto; position: relative; overflow: hidden; }
        #progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: #fff; transition: width 0.1s linear; }
        #loading-text { font-family: 'Inter', sans-serif; font-size: 12px; letter-spacing: 0.2em; }

        /* UI 前景层：完全保留你的 CSS，仅增加 mix-blend-mode 实现自动黑白反转 */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; 
            mix-blend-mode: difference; color: #fff;
            transition: opacity 0.1s linear;
        }

        .framer-xy-hero { position: absolute; left: 6vw; top: 50%; transform: translateY(-50%); max-width: 520px; }
        .framer-xy-hero h1 { font-family: 'EB Garamond', 'STSong', serif; font-size: clamp(48px, 6vw, 82px); letter-spacing: 0.04em; font-weight: 400; margin: 0 0 20px 0; line-height: 1; display: flex; flex-wrap: wrap; gap: 16px; align-items: baseline; }
        .framer-xy-sub { font-family: 'EB Garamond', serif; font-size: 16px; color: rgba(255,255,255,0.8); letter-spacing: 0.02em; line-height: 1.6; max-width: 440px; font-weight: 400; }
        
        .framer-xy-brand { position: absolute; top: 50%; right: 6vw; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 24px; }
        .framer-xy-brand .zh { writing-mode: vertical-rl; letter-spacing: 1.2em; font-weight: 500; opacity: 0.9; font-family: 'STSong', serif; font-size: 16px; }
        
        .hint-bottom { position: absolute; bottom: 36px; left: 6vw; display: flex; flex-direction: column; gap: 20px; pointer-events: none; }
        .hint-en { font-family: 'EB Garamond', serif; font-style: italic; font-size: 16px; letter-spacing: 0.03em; color: rgba(255,255,255,0.7); max-width: 480px; line-height: 1.6; }
        .hint-scroll { display: flex; align-items: center; gap: 12px; font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.8); text-transform: uppercase; }
        .hint-line { width: 40px; height: 1px; background: #fff; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="loading">
        <div>Take a cup of tea.</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="loading-text">0%</div>
    </div>

    <div id="ui-layer">
        <div class="framer-xy-hero">
            <h1><span>Welcome,</span><span>歡迎,</span><span>こんにちは</span></h1>
            <div class="framer-xy-sub">
                Product Designer & Creative Development.<br>
                Crafting digital experiences with an aesthetic and modern design.
            </div>
        </div>
        <div class="framer-xy-brand">
            <div class="zh">先行先聽 萬縷歸心</div>
        </div>
        <div class="hint-bottom">
            <div class="hint-en">Foreground bank, distant peaks—mist breathes, birds stitch the hush, and moss remembers the ink.</div>
            <div class="hint-scroll"><div class="hint-line"></div>Scroll down to explore</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==========================================
        // 1. Shaders: 注入交互，完美保留底层逻辑
        // ==========================================
        const mountainVert = `
            uniform float uTime;
            uniform float uScroll; 
            uniform vec3 uMouse;

            attribute float aSize;
            attribute float aAlpha;
            
            varying float vAlpha;
            varying float vMouseDist;
            varying float vCollapse;

            void main() {
                vec3 pos = position;
                
                float phase = fract(sin(dot(pos.xz, vec2(12.9898, 78.233))) * 43758.5453) * 6.2831;
                float twinkle = 0.6 + 0.8 * sin(uTime * 2.0 + phase);
                pos.y += sin(uTime * 0.35 + pos.x * 0.008) * 0.5; 
                
                vec4 originalWorldPos = modelMatrix * vec4(pos, 1.0);
                vMouseDist = distance(originalWorldPos.xyz, uMouse);

                float valleyMask = smoothstep(100.0, -200.0, originalWorldPos.z);
                float wave = sin(originalWorldPos.x * 0.002 + uTime * 0.5) * cos(originalWorldPos.z * 0.002 + uTime * 0.0) * 1000.0;
                float seaLevel = 100.0 + wave;
                float bottomFade = smoothstep(seaLevel - 60.0, seaLevel + 120.0, originalWorldPos.y);

                float s = clamp((uScroll - 0.1) * 1.25, 0.0, 1.0); 
                float easeScroll = s * s * s; 
                float dropFactor = 1.0 + fract(sin(dot(pos.xz, vec2(12.9898, 78.233))) * 43758.5453) * 2.0; 
                
                pos.y -= easeScroll * 2500.0 * dropFactor;
                pos.x += sin(pos.y * 0.01 + uTime) * easeScroll * 500.0;
                pos.z += cos(pos.x * 0.01 + uTime) * easeScroll * 500.0;

                // [交互] 60% 后的崩塌特效
                float collapsePhase = smoothstep(0.6, 1.0, uScroll);
                vCollapse = collapsePhase;
                float noise = fract(sin(dot(pos.xz, vec2(12.9898, 78.233))) * 43758.5453);
                pos.y -= collapsePhase * (150.0 + noise * 600.0);
                pos.x += (noise - 0.5) * collapsePhase * 300.0;
                pos.z += (fract(noise * 34.0) - 0.5) * collapsePhase * 300.0;

                vec4 worldPos = modelMatrix * vec4(pos, 1.0);
                vec4 mvPosition = viewMatrix * worldPos;
                gl_Position = projectionMatrix * mvPosition;
                
                float size = aSize * (1000.0 / -mvPosition.z);
                float inkExpansion = 1.0 + easeScroll * 10.0;
                float currentTwinkle = mix(twinkle, 1.0, s);
                gl_PointSize = clamp(size * (0.8 + 0.2 * currentTwinkle) * inkExpansion * (1.0 + collapsePhase), 1.0, 150.0); 
                
                vAlpha = aAlpha * mix(1.0, bottomFade, valleyMask) * currentTwinkle;
                vAlpha *= (1.0 - smoothstep(0.85, 1.0, uScroll));
            }
        `;

        const mountainFrag = `
            uniform vec3 uColor;
            uniform float uScroll;
            varying float vAlpha;
            varying float vMouseDist;
            varying float vCollapse;

            void main() {
                float d = distance(gl_PointCoord, vec2(0.5));
                float s = clamp((uScroll - 0.1) * 1.25, 0.0, 1.0);
                float core = mix(0.1, 0.45, s * s); 
                float shape = smoothstep(0.5, core, d); 
                
                // [交互] 拨云见日：精准小范围 (180半径)
                float clearFactor = 1.0 - smoothstep(0.0, 180.0, vMouseDist);
                float a = vAlpha * shape;
                a = mix(a, a * 1.8, clearFactor); 
                a *= (1.0 - vCollapse); // 崩塌渐隐
                
                if (a < 0.01) discard;

                // [交互] 40%-60% 黑白反转
                vec3 targetColor = vec3(0.95, 0.95, 0.95);
                float invertPhase = smoothstep(0.4, 0.6, uScroll);
                vec3 baseColor = mix(uColor, targetColor, invertPhase);
                
                vec3 extremeColor = mix(vec3(0.0), vec3(1.0), invertPhase);
                vec3 finalColor = mix(baseColor, extremeColor, clearFactor * 0.8);

                gl_FragColor = vec4(finalColor, a);
            }
        `;

        const birdVert = `
            attribute float aSize; attribute float aScale; uniform float uTime; uniform float uScroll; varying float vDepth; varying float vScale;
            void main(){
                vScale = aScale;
                vec3 pos = position;
                pos.y += sin(uTime * 3.0 + pos.x * 0.05) * 8.0; 
                vec4 originalMv = modelViewMatrix * vec4(pos, 1.0);
                vDepth = smoothstep(-2500.0, -500.0, originalMv.z);
                
                float s = clamp((uScroll - 0.1) * 1.25, 0.0, 1.0);
                float easeScroll = s * s * s;
                float dropFactor = 1.0 + fract(sin(dot(pos.xz, vec2(12.9898, 78.233))) * 43758.5453) * 3.0; 
                
                pos.y -= easeScroll * 3500.0 * dropFactor; 
                pos.x += sin(pos.y * 0.05) * easeScroll * 400.0;

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                float size = aSize * (1000.0 / -mvPosition.z);
                float inkExpansion = 1.0 + easeScroll * 12.0;
                gl_PointSize = size * inkExpansion * aScale;
            }
        `;

        const birdFrag = `
            uniform vec3 uColor; uniform float uScroll; varying float vDepth;
            void main(){
                vec2 uv = gl_PointCoord - vec2(0.5);
                float v = abs(uv.x*1.5) + uv.y*0.8; 
                float s = clamp((uScroll - 0.1) * 1.25, 0.0, 1.0);
                float shapeNormal = smoothstep(0.4, 0.05, abs(v - 0.1));
                float shapeMelt = smoothstep(0.5, 0.1, length(uv));
                float shape = mix(shapeNormal, shapeMelt, smoothstep(0.0, 0.4, s));

                if (shape < 0.01) discard;
                
                // [交互] 鸟的颜色同步反转
                vec3 targetColor = vec3(0.9, 0.9, 0.95);
                vec3 finalColor = mix(uColor, targetColor, smoothstep(0.4, 0.6, uScroll));

                float alphaFade = 1.0 - smoothstep(0.6, 1.0, uScroll);
                gl_FragColor = vec4(finalColor, shape * mix(0.2, 0.9, vDepth) * alphaFade); 
            }
        `;

        // ==========================================
        // 2. 原封不动的地形数学算法
        // ==========================================
        function hash(n){return Math.abs(Math.sin(n)*10000.0)%1.0}
        function mix(a,b,t){return a*(1.0-t)+b*t}
        function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
        function smoothstep(edge0,edge1,x){let t=clamp((x-edge0)/(edge1-edge0),0,1);return t*t*(3-2*t)}
        function noise2D(x,z){const ix=Math.floor(x),iz=Math.floor(z);const fx=x-ix,fz=z-iz;const ux=fx*fx*(3.0-2.0*fx);const n00=hash(ix+iz*57),n10=hash(ix+1+iz*57),n01=hash(ix+(iz+1)*57),n11=hash(ix+1+(iz+1)*57);return mix(mix(n00,n10,ux),mix(n01,n11,ux),fz)}
        function fbm(x,z,oct=5){let v=0,a=0.5;for(let i=0;i<oct;i++){v+=a*noise2D(x,z);x=x*2.05+100;z=z*2.25+100;a*=0.5}return v}
        function ridge1D(x){let n=fbm(x*0.0012,10.0,5);let r=1.0-Math.abs(n-0.5)*2.0;r=Math.pow(Math.max(0,r),2.2);let cut=fbm(x*0.004,200.0,3);cut=smoothstep(0.25,0.75,cut);return r*cut}
        function bandMask(z,center,width){let d=Math.abs(z-center)/width;return Math.pow(Math.max(0,1.0-d),2.0)}
        function centralMistFactor(x){return 1.0-Math.exp(-Math.pow(x/520.0,2.0))}

        function getTerrainData(x,z){
            const fg=bandMask(z,1000,350), near=bandMask(z,220,460), mid=bandMask(z,-160,560), far=bandMask(z,-720,720);
            let fgCut=smoothstep(100.0,1200.0,x);
            let rightBank=Math.max(0,1.0-Math.pow((x-1400)/800,2))*380.0;
            let sFg=ridge1D(x-900)*120+rightBank, sNear=ridge1D(x+80)*240, sMid=ridge1D(x-220)*720, sFar=ridge1D(x+520)*420;
            let texN=fbm(x*0.003,z*0.004,4), texR=1.0-Math.abs(texN-0.5)*2.0; texR=Math.pow(Math.max(0,texR),2.8);
            let h=fg*fgCut*(sFg+texR*120)+near*(sNear+texR*140)+mid*(sMid+texR*240)+far*(sFar+texR*120);
            let cm=centralMistFactor(x), cmFinal=mix(cm,1.0,fg*0.8); h*=cmFinal*0.65+0.35; h-=z*0.25;
            let baseH=h-520.0; baseH+=fg*fgCut*350.0;
            return{h:baseH, ridge:texR, cm:cm, fg:fg*fgCut, far:far}
        }

        // ==========================================
        // 3. 场景渲染与动画
        // ==========================================
        let scene, camera, renderer, mountainMat, birdMesh, birdGeo;
        let birdData = [], scrollProgress = 0;
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-999,-999);
        const targetMousePos = new THREE.Vector3(-999,-999,0);
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

        async function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0xffffff, 0.0001);
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 7000);
            camera.position.set(0, 260, 2450);

            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(1.5, window.devicePixelRatio || 1));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0xffffff, 0);
            container.appendChild(renderer.domElement);

            const extX=2600, minZ=-1200, maxZ=1200, cellSize=16.0, density=45.0, lx=-0.8, ly=0.4, lz=-0.4;
            const MAX_POINTS = 250000;
            const positions = new Float32Array(MAX_POINTS*3), sizes = new Float32Array(MAX_POINTS), alphas = new Float32Array(MAX_POINTS);
            let pIdx = 0;

            const totalSteps = Math.floor((extX*2)/cellSize);
            let lastYield = performance.now();

            for (let cx=-extX, step=0; cx<=extX; cx+=cellSize, step++) {
                for (let cz=minZ; cz<=maxZ; cz+=cellSize) {
                    const tx = cx+cellSize/2, tz = cz+cellSize/2, t = getTerrainData(tx,tz);
                    if (t.h<-330 && t.fg<0.1) continue;

                    const eps=4.0, hx=getTerrainData(tx+eps,tz).h, hz=getTerrainData(tx,tz+eps).h;
                    let nx=-(hx-t.h)/eps, nz=-(hz-t.h)/eps, ny=1.0, nlen=Math.sqrt(nx*nx+ny*ny+nz*nz);
                    nx/=nlen; ny/=nlen; nz/=nlen; const dotLight=nx*lx+ny*ly+nz*lz;

                    let shadow = Math.pow(smoothstep(0.1,-0.6,dotLight),2.5), depth = smoothstep(minZ,maxZ,cz);

                    if (t.fg>0.05) {
                        let veg = smoothstep(50,400,t.h)*smoothstep(0.85,0.98,ny);
                        let prob = shadow*1.3 + Math.pow(t.ridge,3.0)*1.5 + veg*3.0;
                        prob *= 1.0-smoothstep(-0.1,0.5,dotLight)*0.95; prob*=mix(0.1,1.4,depth); prob*=t.fg*1.5;
                        let count = Math.min(Math.floor(prob*density*1.2), 45);

                        for (let p=0; p<count; p++) { if(pIdx>=MAX_POINTS) break;
                            const px = cx+Math.random()*cellSize, pz = cz+Math.random()*cellSize;
                            positions[pIdx*3]=px; positions[pIdx*3+1]=getTerrainData(px,pz).h; positions[pIdx*3+2]=pz;
                            sizes[pIdx] = mix(1.5,4.5,depth)+shadow*2.0+veg*6.0;
                            alphas[pIdx] = mix(0.1,0.9,depth*Math.min(prob,1.2)); pIdx++;
                        }
                    } else {
                        let farF=smoothstep(-100.0,-1000.0,cz), isP=smoothstep(100.0,500.0,t.h);
                        let prob = Math.pow(t.ridge,3.4)*2.0+shadow*1.15; prob*=0.5+0.5*t.cm; prob*=mix(0.25,1.15,depth);
                        prob*=mix(0.55,1.0,smoothstep(-260,220,t.h)); prob*=1.0+farF*isP*2.0;
                        let count = Math.min(Math.floor(prob*density), 18);

                        for (let p=0; p<count; p++) { if(pIdx>=MAX_POINTS) break;
                            const sid=(Math.floor(tx/18)+Math.floor(tz/18)*911)*37.1+p*13.7;
                            const px=cx+hash(sid*1.3)*cellSize, pz=cz+hash(sid*7.9)*cellSize;
                            positions[pIdx*3]=px; positions[pIdx*3+1]=getTerrainData(px,pz).h; positions[pIdx*3+2]=pz;
                            sizes[pIdx] = mix(1.2,3.6,depth)+shadow*2.0+Math.pow(t.ridge,2.0)*1.5 + (farF>0.1 ? 15.0*farF*isP : 0);
                            alphas[pIdx] = clamp(mix(0.1,0.6,depth)*(0.55+0.45*t.cm)*mix(0.85,1.0,shadow) + (farF>0.1 ? 0.8*farF*isP : 0), 0.05, 1.0); pIdx++;
                        }
                    }
                }
                if (performance.now()-lastYield>20) {
                    const pct = Math.min(Math.floor((step/totalSteps)*100),99);
                    document.getElementById('progress-fill').style.width = pct+"%"; document.getElementById('loading-text').innerText = pct+"%";
                    await new Promise(r=>requestAnimationFrame(r)); lastYield=performance.now();
                }
            }
            document.getElementById('loading').style.opacity = '0'; setTimeout(()=>document.getElementById('loading').style.display = 'none', 800);

            const geo = new THREE.BufferGeometry();
            geo.setAttribute("position", new THREE.BufferAttribute(positions.subarray(0,pIdx*3),3));
            geo.setAttribute("aSize", new THREE.BufferAttribute(sizes.subarray(0,pIdx),1));
            geo.setAttribute("aAlpha", new THREE.BufferAttribute(alphas.subarray(0,pIdx),1));

            mountainMat = new THREE.ShaderMaterial({
                vertexShader: mountainVert, fragmentShader: mountainFrag,
                uniforms: { uTime:{value:0}, uColor:{value:new THREE.Color(0x2a2a2a)}, uScroll:{value:0}, uMouse:{value:new THREE.Vector3(0,0,0)} },
                transparent: true, blending: THREE.NormalBlending, depthWrite: false,
            });
            const mountain = new THREE.Points(geo, mountainMat); mountain.renderOrder=30; scene.add(mountain);

            const bPos = new Float32Array(45*3), bSize = new Float32Array(45), bScale = new Float32Array(45).fill(1.0);
            for (let f=0; f<3; f++) {
                const fZ=-500-Math.random()*1500, fY=300+Math.random()*400, fS=0.8+Math.random()*0.5, sX=f*2500+Math.random()*2000;
                for (let b=0; b<15; b++) {
                    const oX=b*(30+Math.random()*20), oZ=(Math.random()-0.5)*150*(b*0.1+1), oY=(Math.random()-0.5)*50;
                    bSize[f*15+b] = 15+Math.random()*10;
                    birdData.push({
                        baseX: -2500-sX+oX, baseY: fY+oY, baseZ: fZ+oZ,
                        curX: -2500-sX+oX, curY: fY+oY, curZ: fZ+oZ,
                        vx: 0, vy: 0, vz: 0, speed: fS, targetScale: 1.0, currentScale: 1.0
                    });
                }
            }

            birdGeo = new THREE.BufferGeometry();
            birdGeo.setAttribute("position", new THREE.BufferAttribute(bPos,3).setUsage(THREE.DynamicDrawUsage));
            birdGeo.setAttribute("aSize", new THREE.BufferAttribute(bSize,1));
            birdGeo.setAttribute("aScale", new THREE.BufferAttribute(bScale,1).setUsage(THREE.DynamicDrawUsage));

            const bMat = new THREE.ShaderMaterial({
                vertexShader: birdVert, fragmentShader: birdFrag,
                uniforms: { uColor:{value:new THREE.Color(0x111111)}, uTime:{value:0}, uScroll:{value:0} },
                transparent: true, depthWrite: false,
            });
            birdMesh = new THREE.Points(birdGeo, bMat); birdMesh.renderOrder=90; scene.add(birdMesh);

            bindEvents(); animate();
        }

        function bindEvents() {
            window.addEventListener('resize', ()=>{
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            window.addEventListener('scroll', ()=>{
                scrollProgress = Math.min(window.scrollY / window.innerHeight, 1.0);
                document.getElementById('ui-layer').style.opacity = 1 - smoothstep(0.6, 0.9, scrollProgress);
            });
            window.addEventListener('mousemove', (e)=>{
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                if(camera){ raycaster.setFromCamera(mouse, camera); raycaster.ray.intersectPlane(plane, targetMousePos); }
            });
        }

        let lastTime = performance.now();
        const colorW = new THREE.Color(0xffffff), colorB = new THREE.Color(0x000000);

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.033, (performance.now() - lastTime) / 1000); lastTime = performance.now();
            const t = lastTime * 0.001;

            if (mountainMat) { mountainMat.uniforms.uTime.value = t; mountainMat.uniforms.uScroll.value = scrollProgress; mountainMat.uniforms.uMouse.value.lerp(targetMousePos, 0.08); }
            if (birdMesh) {
                birdMesh.material.uniforms.uTime.value = t; birdMesh.material.uniforms.uScroll.value = scrollProgress;
                const pos = birdGeo.attributes.position.array, scales = birdGeo.attributes.aScale.array;
                for (let i = 0; i < birdData.length; i++) {
                    const b = birdData[i], dist = Math.sqrt(Math.pow(b.curX-targetMousePos.x,2)+Math.pow(b.curZ-targetMousePos.z,2));
                    b.baseX += b.speed * dt * 60.0; if (b.baseX > 2500) { b.baseX = -4500 - Math.random()*3000; b.curX = b.baseX; }
                    
                    if(dist < 300) { const f = (300-dist)/300; b.vx+=(b.curX-targetMousePos.x)/dist*f*10; b.vy+=f*4+Math.random(); b.vz+=(b.curZ-targetMousePos.z)/dist*f*10; b.targetScale=0.2; } else { b.targetScale=1.0; }
                    b.vx+=(b.baseX-b.curX)*0.001; b.vy+=(b.baseY-b.curY)*0.001; b.vz+=(b.baseZ-b.curZ)*0.001; b.vx*=0.96; b.vy*=0.96; b.vz*=0.96;
                    b.curX+=b.vx; b.curY+=b.vy; b.curZ+=b.vz; pos[i*3]=b.curX; pos[i*3+1]=b.curY; pos[i*3+2]=b.curZ;
                    b.currentScale+=(b.targetScale-b.currentScale)*0.05; scales[i]=b.currentScale;
                }
                birdGeo.attributes.position.needsUpdate = true; birdGeo.attributes.aScale.needsUpdate = true;
            }

            let bgMix = smoothstep(0.4, 0.6, scrollProgress);
            let r = Math.round(mix(255, 10, bgMix)), g = Math.round(mix(255, 10, bgMix)), cB = Math.round(mix(255, 10, bgMix));
            document.body.style.backgroundColor = `rgb(${r},${g},${cB})`;
            scene.fog.color.lerpColors(colorW, colorB, bgMix);

            renderer.render(scene, camera);
        }
        init();
    </script>
